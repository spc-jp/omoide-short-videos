<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オモイデ・ショート - 大切な時間を残す動画撮影ガイド</title>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (ブラウザ上でReactを動かすため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* シニアでも見やすいフォントと優しい配色 */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            background-color: #fdf8f5; 
            color: #333333;
        }
        .btn-primary { 
            background-color: #f08a5d; 
            color: white; 
            transition: all 0.2s; 
        }
        .btn-primary:active { 
            transform: scale(0.98); 
            background-color: #e07a4d; 
        }
        .btn-select {
            background-color: white;
            border: 2px solid #f08a5d;
            color: #f08a5d;
            transition: all 0.2s;
        }
        .btn-select:active {
            background-color: #f08a5d;
            color: white;
        }
        /* Toast animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [scene, setScene] = useState('');
            const [theme, setTheme] = useState('');
            const [duration, setDuration] = useState('');
            
            const [loading, setLoading] = useState(false);
            const [guideData, setGuideData] = useState(null);
            const [currentCut, setCurrentCut] = useState(0);

            // モーダルとトースト用のステータス
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [toastMessage, setToastMessage] = useState("");

            // プライベート向けの選択肢データ
            const scenes = [
                "✈️ 旅行・お出かけ", 
                "⛳️ ゴルフのラウンド", 
                "🎈 家族行事・日常", 
                "🎨 趣味・こだわりの時間"
            ];
            const themes = [
                "😄 みんなの笑顔・わちゃわちゃ感", 
                "🌅 景色・その場の空気感", 
                "👀 集中している真剣な表情", 
                "🏃‍♀️ 動きや躍動感（プレイや遊び）", 
                "🍽️ 美味しい食事・リラックス"
            ];
            const durations = ["⏱️ 15秒（サクッと）", "⏱️ 30秒（しっかり）", "⏱️ 60秒（たっぷり）"];

            // APIを叩いて撮影ガイドを生成する関数
            const generateGuide = async (selectedDuration) => {
                setDuration(selectedDuration);
                setLoading(true);
                setStep(4);
                
                const apiKey = ""; 
                
                const prompt = `あなたは動画撮影が初めての人を優しくサポートする、ホームビデオ監督AIです。
以下の条件で、CapCut自動カット機能を使ったプライベート用ショート動画の撮影ガイドをJSONで作成してください。

シーン: ${scene}
テーマ: ${theme}
動画尺: ${selectedDuration}

・1カットあたり5〜7秒程度で構成する
・専門用語を使わず、なぜその撮影をするのか、後から思い出として振り返る視点から説明する
・「子供の目線に合わせてしゃがむ」「自然な笑顔を引き出すために声をかける」など、ホームビデオならではの温かい撮影テクニックを交える
・機械的な冷たい言葉を避け、寄り添うような人間味のある温かいトーンでアドバイスする
・JSONフォーマットで出力すること。`;

                const systemPrompt = `You are an expert home video director for beginners. Respond with JSON only. No markdown formatting.
Schema:
{
  "cuts": [
    { "step": number, "instruction": "string", "purpose": "string", "duration": number, "technique": "string", "tips": "string", "ng": "string" }
  ],
  "sns": { "text": "string", "hashtags": ["string"], "bgm": "string", "title": "string" }
}`;

                // プライベート用のモックデータ（APIエラー時に表示）
                const mockData = {
                    cuts: [
                        { step: 1, instruction: "楽しそうに話しているみんなの様子を撮りましょう", purpose: "この日のワクワクした空気感を、そのまま残すためです。", duration: 5, technique: "胸の高さで固定", tips: "「楽しいね！」と声をかけながら、自然な笑顔を引き出してみましょう。", ng: "無言でカメラを向けると、みんな緊張してしまいます。" },
                        { step: 2, instruction: "周りの綺麗な景色や、その場所の看板を撮りましょう", purpose: "後から見たときに「あそこに行ったね！」と思い出せるようにするためです。", duration: 6, technique: "ゆっくり横へスライド", tips: "息を止めて、3秒かけてゆっくりと景色を見渡すように動かします。", ng: "速く動かしすぎると、見ている人が酔ってしまいます。" },
                        { step: 3, instruction: "誰かが笑っている顔を少しアップで撮りましょう", purpose: "一番の思い出は、やっぱり大切な人の笑顔だからです。", duration: 5, technique: "少し近づく", tips: "相手の目の高さに合わせてしゃがんだりして、表情がよく見えるようにしましょう。", ng: "遠くから小さく撮ると、表情が伝わりません。" },
                        { step: 4, instruction: "最後は、みんなの後ろ姿や歩いている足元を撮りましょう", purpose: "動画の終わりに、少しエモーショナルな余韻を残すためです。", duration: 5, technique: "固定撮影", tips: "そのままじっと5秒数えます。波の音や笑い声が入るとさらに素敵です。", ng: "歩きながら撮るとブレて見にくくなります。" }
                    ],
                    sns: {
                        text: "かけがえのない大切な時間を、短い動画にまとめてみました。みんなの笑顔が見れて最高の1日でした！✨",
                        hashtags: ["#大切な思い出", "#休日の過ごし方", "#笑顔が一番"],
                        bgm: "温かみのあるアコースティックギターやウクレレ",
                        title: "私たちの素敵な思い出"
                    }
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API Error");
                    
                    const data = await response.json();
                    const generatedText = data.candidates[0].content.parts[0].text;
                    setGuideData(JSON.parse(generatedText));
                } catch (err) {
                    console.warn("APIリクエスト失敗。モックデータを使用します。", err);
                    setGuideData(mockData);
                } finally {
                    setLoading(false);
                }
            };

            const handleCopy = () => {
                const textToCopy = `【${guideData.sns.title}】\n\n${guideData.sns.text}\n\n${guideData.sns.hashtags.join(" ")}`;
                
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setToastMessage("クリップボードにコピーしました！");
                } catch (err) {
                    setToastMessage("コピーに失敗しました。手動でコピーしてください。");
                }
                document.body.removeChild(textArea);
                
                setTimeout(() => setToastMessage(""), 3000);
            };

            const renderTop = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-sm w-full max-w-sm">
                        <div className="mb-4">
                            <span className="text-4xl">📸</span>
                        </div>
                        <h1 className="text-3xl font-black text-gray-800 mb-2">オモイデ・ショート</h1>
                        <p className="text-orange-500 font-bold mb-8">〜 大切な時間を残す動画ガイド 〜</p>
                        <p className="text-gray-600 mb-8 font-medium leading-relaxed">
                            難しい撮影テクニックは不要です。<br/>
                            AIの提案に沿って5秒ずつ撮るだけで、<br/>
                            最高に温かい思い出動画が完成します！
                        </p>
                        <button onClick={() => setStep(1)} className="btn-primary w-full text-xl py-4 rounded-2xl shadow-lg font-bold">
                            さっそく始める
                        </button>
                    </div>
                </div>
            );

            const renderSelection = (title, options, onSelect) => (
                <div className="max-w-md mx-auto p-4 flex flex-col min-h-[90vh]">
                    <div className="mb-8 mt-4 text-center">
                        <p className="text-sm text-orange-500 font-bold mb-2">STEP {step} / 3</p>
                        <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
                    </div>
                    <div className="grid grid-cols-1 gap-3 flex-grow">
                        {options.map((opt, i) => (
                            <button 
                                key={i} 
                                onClick={() => onSelect(opt)}
                                className="btn-select w-full text-lg py-4 rounded-xl font-bold shadow-sm"
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    <div className="mt-6 flex flex-col space-y-2">
                        <button onClick={() => setStep(step - 1)} className="text-gray-500 font-bold py-3">
                            ◀ 1つ前に戻る
                        </button>
                        <button onClick={() => { setStep(0); setScene(''); setTheme(''); setDuration(''); }} className="text-gray-400 text-sm font-bold py-2">
                            最初からやり直す
                        </button>
                    </div>
                </div>
            );

            const renderGuide = () => {
                if (loading || !guideData) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-[90vh] p-4 text-center relative">
                            <button 
                                onClick={() => { setStep(0); setLoading(false); }}
                                className="absolute top-4 left-4 text-gray-400 text-sm font-bold"
                            >
                                ◀ 中止する
                            </button>
                            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-orange-500 mb-6 mx-auto"></div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">撮影プランを作成中...</h2>
                            <p className="text-gray-600">あなたの大切な時間を残す方法を考えています</p>
                        </div>
                    );
                }

                const cut = guideData.cuts[currentCut];
                const isLast = currentCut === guideData.cuts.length - 1;

                return (
                    <div className="max-w-md mx-auto p-4 flex flex-col min-h-screen">
                        {/* ヘッダー操作部 */}
                        <div className="flex justify-between items-center mb-2 mt-2 px-1">
                            <button 
                                onClick={() => setShowResetConfirm(true)} 
                                className="text-gray-400 text-sm font-bold flex items-center"
                            >
                                ◀ 最初に戻る
                            </button>
                            {currentCut > 0 && (
                                <button 
                                    onClick={() => setCurrentCut(c => c - 1)}
                                    className="text-gray-500 text-sm font-bold bg-white border border-gray-200 px-4 py-1.5 rounded-full shadow-sm active:bg-gray-50"
                                >
                                    前のカット
                                </button>
                            )}
                        </div>
                        
                        <div className="mb-4">
                            <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                <span className="text-orange-500 font-bold">撮影ガイド</span>
                                <span className="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-bold">
                                    カット {currentCut + 1} / {guideData.cuts.length}
                                </span>
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-3xl shadow-sm p-6 mb-6 flex-grow border-t-4 border-orange-400">
                            <h2 className="text-2xl font-black text-gray-800 mb-6 leading-tight">{cut.instruction}</h2>
                            
                            <div className="bg-orange-50 p-4 mb-6 rounded-2xl">
                                <p className="text-sm text-orange-800 font-bold mb-1 flex items-center">
                                    <span className="text-xl mr-1">❤️</span> なぜ撮るの？
                                </p>
                                <p className="text-gray-800 font-medium">{cut.purpose}</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮影時間</p>
                                    <p className="text-xl font-black text-gray-800">約 {cut.duration} 秒</p>
                                </div>
                                <div className="bg-gray-50 p-4 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮り方</p>
                                    <p className="text-md font-black text-gray-800">{cut.technique}</p>
                                </div>
                            </div>

                            <div className="space-y-4 mb-6">
                                <div className="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                                    <p className="text-sm font-bold text-green-700 mb-1">✅ 素敵に撮るコツ</p>
                                    <p className="text-gray-700 text-sm">{cut.tips}</p>
                                </div>
                                <div className="bg-red-50/50 p-4 rounded-2xl border border-red-100">
                                    <p className="text-sm font-bold text-red-600 mb-1">⚠️ ここだけ注意！</p>
                                    <p className="text-gray-700 text-sm">{cut.ng}</p>
                                </div>
                            </div>

                            {/* カメラ起動ボタン */}
                            <div className="mt-4">
                                <label className="flex items-center justify-center w-full bg-red-500 text-white py-4 rounded-xl font-bold cursor-pointer transition-colors hover:bg-red-600 shadow-lg">
                                    <span className="text-2xl mr-2">📸</span> カメラを開く (約{cut.duration}秒)
                                    <input type="file" accept="video/*" capture="environment" className="hidden" />
                                </label>
                            </div>
                        </div>

                        <button 
                            onClick={() => isLast ? setStep(5) : setCurrentCut(c => c + 1)}
                            className="btn-primary w-full text-xl py-5 rounded-2xl shadow-lg font-bold mt-auto mb-4"
                        >
                            {isLast ? "すべての撮影を完了する！" : "撮れた！（次の指示へ）"}
                        </button>
                    </div>
                );
            };

            const renderComplete = () => (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-12">
                    <div className="text-center mb-8 mt-6">
                        <h2 className="text-3xl font-black text-gray-800 mb-2">🎉 お疲れ様でした！</h2>
                        <p className="text-gray-600 font-medium">素敵な思い出のパーツが揃いました。</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-6">
                        <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                            <span className="mr-2">✂️</span> アプリで1つに繋げましょう
                        </h3>
                        <ol className="list-decimal list-inside text-gray-700 space-y-3 font-medium">
                            <li>スマホで <strong>CapCut</strong> を開く</li>
                            <li><strong>「自動カット」</strong> をタップ</li>
                            <li>今撮った動画を <strong>古い順に</strong> 選ぶ</li>
                            <li>あとはAIにおまかせ！</li>
                        </ol>
                        <div className="mt-5 p-4 bg-orange-50 rounded-2xl text-sm text-gray-700 border border-orange-100">
                            💡 おすすめのBGMの雰囲気：<br/><strong className="text-orange-600 text-base">{guideData.sns.bgm}</strong>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-8">
                        <h3 className="text-xl font-bold text-gray-800 mb-2 flex items-center">
                            <span className="mr-2">📝</span> 家族や友人にシェアする時の一言
                        </h3>
                        <p className="text-xs text-gray-500 mb-4">コピーしてLINEやSNSに貼り付けられます。</p>
                        
                        <div className="bg-gray-50 p-4 rounded-2xl text-gray-700 whitespace-pre-wrap mb-4 font-sans text-sm border border-gray-100">
                            【{guideData.sns.title}】{"\n\n"}
                            {guideData.sns.text}{"\n\n"}
                            {guideData.sns.hashtags.join(" ")}
                        </div>
                        
                        <button 
                            onClick={handleCopy}
                            className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold transition-colors hover:bg-gray-700"
                        >
                            テキストをコピーする
                        </button>
                    </div>
                    
                    <button 
                        onClick={() => setShowResetConfirm(true)}
                        className="w-full text-orange-600 py-4 font-bold"
                    >
                        最初からやり直す
                    </button>
                </div>
            );

            // 確認用モーダルUI
            const renderConfirmModal = () => {
                if (!showResetConfirm) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl">
                            <h3 className="text-xl font-bold text-gray-800 mb-2">最初に戻りますか？</h3>
                            <p className="text-gray-600 text-sm mb-6">現在のガイドのデータはリセットされます。</p>
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setShowResetConfirm(false)}
                                    className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl"
                                >
                                    キャンセル
                                </button>
                                <button 
                                    onClick={() => {
                                        setShowResetConfirm(false);
                                        setStep(0); 
                                        setCurrentCut(0); 
                                        setGuideData(null);
                                    }}
                                    className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl"
                                >
                                    戻る
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="font-sans antialiased">
                    {step === 0 && renderTop()}
                    {step === 1 && renderSelection("どんなシーンで撮りますか？", scenes, (val) => { setScene(val); setStep(2); })}
                    {step === 2 && renderSelection("動画のメインテーマは？", themes, (val) => { setTheme(val); setStep(3); })}
                    {step === 3 && renderSelection("動画の長さは？", durations, (val) => generateGuide(val))}
                    {step === 4 && renderGuide()}
                    {step === 5 && renderComplete()}
                    
                    {/* モーダル表示 */}
                    {renderConfirmModal()}

                    {/* トースト通知表示 */}
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-50 text-sm font-bold animate-fade-in-up whitespace-nowrap">
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
