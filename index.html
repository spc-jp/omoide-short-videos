<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オモイデ・ショート Pro - 大切な時間を残す動画撮影ガイド</title>

    <link rel="icon" href="https://spc-jp.github.io/omoide-short-videos/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fdf8f5;
            color: #333333;
        }
        .btn-primary { background-color: #f08a5d; color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: #e07a4d; }
        .btn-select { background-color: white; border: 2px solid #f08a5d; color: #f08a5d; transition: all 0.2s; }
        .btn-select:active { background-color: #f08a5d; color: white; }

        .countdown-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .countdown-num { font-size: 12rem; font-weight: 900; line-height: 1; animation: countdownPulse 1s ease-out; }
        @keyframes countdownPulse {
            0%   { transform: scale(0.5); opacity: 0; }
            30%  { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }
        .recording-bar { height: 12px; background: #f08a5d; border-radius: 6px; transition: width 0.1s linear; }

        @keyframes confettiFall {
            0%   { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed; top: 0; width: 10px; height: 14px; z-index: 90;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes badgePop {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }
        .badge-pop { animation: badgePop 0.6s ease-out; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-area { display: block !important; }
            .print-cut {
                page-break-inside: avoid;
                border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            }
        }
        .print-area { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ====================================================
        // データ定義
        // ====================================================

        const DIRECTORS = [
            { id: 'mom',      emoji: '🌸', name: 'お母さん監督',   desc: '優しく温かく寄り添う',   sample: 'まあいいねぇ、その表情' },
            { id: 'coach',    emoji: '🔥', name: '熱血コーチ',     desc: '元気いっぱい応援型',     sample: 'いいぞ！その調子だ！' },
            { id: 'film',     emoji: '🎬', name: '映画監督',       desc: 'クールで本格派',         sample: 'カット、いい絵が撮れた' },
            { id: 'book',     emoji: '📖', name: '絵本作家',       desc: 'ほのぼの幻想的',         sample: 'そっと、残しましょうね' },
            { id: 'youtuber', emoji: '✨', name: 'キラキラYouTuber', desc: '明るく楽しく賑やか',   sample: 'これ神カットでーす！' }
        ];

        const SCENES = [
            { id: 'travel', label: '✈️ 旅行・お出かけ' },
            { id: 'golf',   label: '⛳️ ゴルフのラウンド' },
            { id: 'family', label: '🎈 家族行事・日常' },
            { id: 'hobby',  label: '🎨 趣味・こだわりの時間' }
        ];

        const THEMES = [
            { id: 'smile',   label: '😄 みんなの笑顔・わちゃわちゃ感' },
            { id: 'scenery', label: '🌅 景色・その場の空気感' },
            { id: 'serious', label: '👀 集中している真剣な表情' },
            { id: 'action',  label: '🏃 動きや躍動感' },
            { id: 'food',    label: '🍽️ 美味しい食事・リラックス' }
        ];

        const DURATIONS = [
            { id: '15', label: '⏱️ 15秒（サクッと）', cuts: 3 },
            { id: '30', label: '⏱️ 30秒（しっかり）', cuts: 4 },
            { id: '60', label: '⏱️ 60秒（たっぷり）', cuts: 6 }
        ];

        const GUIDE_LIBRARY = {
            travel: [
                { instruction: '出発前のワクワクした表情を撮ろう',    purpose: 'この旅の始まりの気持ちを残すためです',         duration: 5, technique: '胸の高さで固定',     tips: '「準備オッケー？」と声をかけて自然な反応を引き出します', ng: 'いきなりカメラを向けると緊張させてしまいます' },
                { instruction: 'みんなが笑っている瞬間を撮ろう',      purpose: '今日いちばんの笑顔こそ宝物だからです',         duration: 5, technique: '胸の高さで固定',     tips: '「楽しいね！」と声をかけながら撮ります',                 ng: '無言でカメラを向けるとみんな緊張します' },
                { instruction: '景色やお店の看板をゆっくり撮ろう',    purpose: 'あとから「ここ行ったね」と思い出すためです',   duration: 6, technique: 'ゆっくり横へスライド', tips: '3秒かけてゆっくり景色を見渡すように動かします',         ng: '速く動かすと見ている人が酔ってしまいます' },
                { instruction: '誰かの笑顔を少しアップで撮ろう',      purpose: '一番の思い出は大切な人の表情だからです',       duration: 5, technique: '少し近づく',         tips: '相手の目の高さに合わせると表情が活きます',             ng: '遠くから小さく撮ると表情が伝わりません' },
                { instruction: '料理を「いただきます」前に撮ろう',    purpose: '旅の味の記憶を残すためです',                   duration: 5, technique: '真上から撮る',       tips: '湯気が立つタイミングを狙うと美味しそうに見えます',     ng: '一口食べた後だと見栄えが落ちます' },
                { instruction: '後ろ姿や歩いている足元を撮ろう',      purpose: '動画の終わりに余韻を残すためです',             duration: 5, technique: '固定撮影',           tips: 'そのまま5秒数えます。波音や笑い声が入ると素敵です',    ng: '歩きながら撮るとブレて見にくくなります' }
            ],
            golf: [
                { instruction: '朝のクラブハウスや空を撮ろう',        purpose: 'ラウンド前の清々しい空気を残すためです',       duration: 5, technique: '空に向けてゆっくり上げる', tips: '芝生と空のコントラストが美しい朝が最高です',         ng: '逆光で真っ白にならないよう注意します' },
                { instruction: '仲間の楽しそうな表情を撮ろう',        purpose: 'ゴルフはスコアより仲間との時間だからです',     duration: 5, technique: '胸の高さで固定',     tips: '「ナイスショット！」のかけ声と一緒に撮ります',         ng: 'スイング中は集中の邪魔になるので避けます' },
                { instruction: 'ティーショットの構えを横から撮ろう',  purpose: '本人の真剣な姿は最高の記念だからです',         duration: 6, technique: '横方向から固定',     tips: '少し離れて全身が入る位置がベストです',                 ng: '正面から撮ると視線が気になります' },
                { instruction: 'グリーン上のパッティングを狙おう',    purpose: '緊張感のあるシーンは見応えがあるからです',     duration: 5, technique: 'ローアングル',       tips: 'カップとボールが両方入るとドラマチックです',           ng: '声を出すとパットの邪魔になります' },
                { instruction: 'カートで移動する風景を撮ろう',        purpose: 'コースの広がりが伝わるからです',               duration: 5, technique: '進行方向に向けて固定', tips: '揺れを抑えるため両手でしっかり持ちます',               ng: '運転中は前を見て、停車中に撮ります' },
                { instruction: 'ラウンド後の乾杯シーンを撮ろう',      purpose: '一日の達成感を残すためです',                   duration: 5, technique: '少し引いて全員入れる', tips: '「お疲れさま！」の声と一緒に乾杯の瞬間を狙います',     ng: '飲み物だけ撮らず必ず人を入れます' }
            ],
            family: [
                { instruction: 'いつもの食卓や生活風景を撮ろう',      purpose: '何気ない日常こそ後で輝くからです',             duration: 5, technique: '胸の高さで固定',     tips: '無理に演出せず、いつも通りを残します',                 ng: '「撮るよ！」と言うと不自然になります' },
                { instruction: '家族の自然な笑い声を撮ろう',          purpose: '声と表情がセットで思い出になるからです',       duration: 5, technique: '少し離れて固定',     tips: 'テレビや会話のシーンを狙うと自然です',                 ng: 'カメラ目線をお願いすると硬くなります' },
                { instruction: '子どもや孫の目線に合わせて撮ろう',    purpose: 'その人の世界が伝わる映像になるからです',       duration: 6, technique: 'しゃがんで低い位置から', tips: '名前を呼んで振り向いた瞬間が最高です',               ng: '上から見下ろすと距離感が出てしまいます' },
                { instruction: '手元や作業の様子を撮ろう',            purpose: '人柄や日常が手から伝わるからです',             duration: 5, technique: '真上から固定',       tips: '料理・編み物・パズルなど手の動きを5秒撮ります',         ng: '顔を出したくない時はこれだけでもOKです' },
                { instruction: 'ペットや観葉植物を撮ろう',            purpose: '家族の一員も思い出に残すためです',             duration: 5, technique: '相手と同じ高さ',     tips: 'おやつで気を引いて自然な表情を引き出します',           ng: '追い回すとストレスをかけてしまいます' },
                { instruction: '玄関や窓の外、リビング全景を撮ろう',  purpose: '家そのものが思い出の舞台だからです',           duration: 5, technique: 'ゆっくりパン',       tips: '5秒かけて部屋を一周するように動かします',               ng: '散らかった所が映らないよう一度確認します' }
            ],
            hobby: [
                { instruction: '道具を並べている様子を撮ろう',        purpose: '趣味のこだわりが一番伝わる瞬間だからです',     duration: 5, technique: '真上から固定',       tips: '光の当たり方を意識すると質感が出ます',                 ng: 'ごちゃごちゃに置かず整えてから撮ります' },
                { instruction: '作業に集中している横顔を撮ろう',      purpose: '夢中になっている表情が最高に魅力的だからです', duration: 6, technique: '横方向から固定',     tips: '声をかけず、そっと撮るのがコツです',                   ng: '正面から撮ると意識して不自然になります' },
                { instruction: '手の動きをアップで撮ろう',            purpose: '技術や愛情が手から伝わるからです',             duration: 5, technique: '少し近づく',         tips: '手ぶれ防止のため肘を体につけて固定します',             ng: '動きが速い時はゆっくり目を意識します' },
                { instruction: '完成した作品や成果を撮ろう',          purpose: '達成感を映像に残すためです',                   duration: 5, technique: '少し斜め上から',     tips: '自然光が当たる窓辺がベストの場所です',                 ng: '蛍光灯の真下は色が悪く写ります' },
                { instruction: '作品と作り手の表情を一緒に撮ろう',    purpose: '作品と人柄をセットで残すためです',             duration: 5, technique: '胸の高さで固定',     tips: '作品を持ってもらい少し笑ってもらいます',               ng: '緊張した顔より自然な表情を引き出します' },
                { instruction: '片付けや道具をしまう瞬間を撮ろう',    purpose: '終わりの余韻を映像で表現するためです',         duration: 5, technique: '固定撮影',           tips: 'そっと終わる感じで5秒数えます',                         ng: '急いで終わらせず丁寧に撮ります' }
            ]
        };

        const THEME_CUT_ORDER = {
            smile:   [1, 3, 0, 5, 2, 4],
            scenery: [2, 5, 0, 4, 1, 3],
            serious: [2, 1, 5, 3, 0, 4],
            action:  [2, 5, 3, 1, 0, 4],
            food:    [4, 1, 0, 3, 5, 2]
        };

        const VOICE_STYLE = {
            mom:      { openLine: 'はい、次はね',         purposeLead: 'これはね、',           tipLead: 'コツはね、',     ngLead: 'ここだけ気をつけて、',     cheer: 'いいわよ、その調子',      complete: '本当によく頑張ったわね。素敵な思い出になったわよ' },
            coach:    { openLine: 'よーし、次いくぞ！',   purposeLead: 'なぜやるか？それは、', tipLead: 'ポイントはここだ！', ngLead: '絶対NGはこれだ！',         cheer: 'ナイスショット！最高だ！', complete: 'やったな！君は今日のMVPだ！' },
            film:     { openLine: 'カット',               purposeLead: 'この画の意味は、',     tipLead: 'テクニック：',       ngLead: 'NG事項：',                 cheer: 'いい絵が撮れている',       complete: '撮影、完了。素晴らしい作品だ' },
            book:     { openLine: 'そっと、次のページを', purposeLead: 'これはね、',           tipLead: 'やさしく、',         ngLead: '気をつけてね、',           cheer: 'うん、いい一枚ですね',     complete: 'すべてが、ひとつの絵本になりました' },
            youtuber: { openLine: '次いっくよー！',       purposeLead: 'なんでかっていうと、', tipLead: 'コツはコレ！',       ngLead: 'やっちゃダメなのはコレ！', cheer: 'やばっ、神カット！',       complete: '今日も最っ高でしたー！皆さんお疲れさまっ✨' }
        };

        const BGM_CATEGORIES = [
            { mood: '温かい・しっとり',   desc: 'アコースティックギター、ピアノ', q: 'フリーBGM 温かい アコースティック' },
            { mood: '楽しい・元気',       desc: 'ウクレレ、ハッピーポップ',         q: 'フリーBGM ハッピー ウクレレ' },
            { mood: 'おしゃれ・カフェ',   desc: 'ボサノヴァ、ジャズ',               q: 'フリーBGM カフェ ボサノヴァ' },
            { mood: 'ドラマチック',       desc: 'ストリングス、ピアノ',             q: 'フリーBGM ドラマチック 感動' },
            { mood: 'エモーショナル',     desc: 'オルゴール、ピアノバラード',       q: 'フリーBGM 感動 オルゴール' }
        ];

        const SNS_TEMPLATES = {
            travel: { title: '今日の小さな旅',     text: '何気ない一日を、ちょっとだけ大切に残してみました。',     tags: ['#旅の思い出', '#日常を切り取る', '#家族時間'] },
            golf:   { title: 'ナイスラウンド',     text: 'スコアより、この時間が宝物。',                         tags: ['#ゴルフ仲間', '#休日ゴルフ', '#ラウンド記録'] },
            family: { title: 'なんでもない日',     text: '特別じゃない日こそ、後で見返すと宝物に。',             tags: ['#家族時間', '#日常記録', '#暮らし'] },
            hobby:  { title: '夢中になれる時間',   text: '時間を忘れて好きなことに向き合えるって幸せ。',         tags: ['#趣味の時間', '#手仕事', '#心地よい'] }
        };

        // ====================================================
        // ユーティリティ関数
        // ====================================================

        const buildGuide = (sceneId, themeId, durationId) => {
            const baseCuts = GUIDE_LIBRARY[sceneId];
            const order = THEME_CUT_ORDER[themeId];
            const cutCount = DURATIONS.find(d => d.id === durationId).cuts;
            const selectedCuts = order.slice(0, cutCount).map(idx => baseCuts[idx]);
            return { cuts: selectedCuts.map((c, i) => ({ ...c, step: i + 1 })) };
        };

        const buildSNS = (sceneId) => SNS_TEMPLATES[sceneId];

        const playSuccessSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
                    o.start(ctx.currentTime + i * 0.12);
                    o.stop(ctx.currentTime + i * 0.12 + 0.3);
                });
            } catch (e) {}
        };

        const playBeep = (high = false) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = high ? 1200 : 800;
                g.gain.setValueAtTime(0.2, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                o.start();
                o.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        };

        const speak = (text) => {
            try {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ja-JP';
                u.rate = 0.95;
                u.pitch = 1.0;
                window.speechSynthesis.speak(u);
            } catch (e) {}
        };

        const JOURNAL_KEY = 'omoide_journal_v1';
        const loadJournal = () => {
            try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]'); }
            catch (e) { return []; }
        };
        const saveJournalEntry = (entry) => {
            const list = loadJournal();
            list.unshift({ ...entry, savedAt: new Date().toISOString() });
            localStorage.setItem(JOURNAL_KEY, JSON.stringify(list.slice(0, 50)));
        };

        // ====================================================
        // メインコンポーネント
        // ====================================================

        const App = () => {
            const [step, setStep] = useState('top');
            const [director, setDirector] = useState(null);
            const [scene, setScene] = useState(null);
            const [theme, setTheme] = useState(null);
            const [duration, setDuration] = useState(null);
            const [guideData, setGuideData] = useState(null);
            const [snsData, setSnsData] = useState(null);
            const [currentCut, setCurrentCut] = useState(0);
            const [countdown, setCountdown] = useState(null);
            const [recording, setRecording] = useState(false);
            const [recordProgress, setRecordProgress] = useState(0);
            const [confetti, setConfetti] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [journal, setJournal] = useState([]);

            useEffect(() => { setJournal(loadJournal()); }, []);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 2500);
            };

            const voice = director ? VOICE_STYLE[director.id] : null;

            const startGuide = (selectedDuration) => {
                setDuration(selectedDuration);
                const guide = buildGuide(scene.id, theme.id, selectedDuration.id);
                const sns = buildSNS(scene.id);
                setGuideData(guide);
                setSnsData(sns);
                setCurrentCut(0);
                setStep('guide');
            };

            const startCountdown = (sec) => {
                setCountdown(3); playBeep(false);
                setTimeout(() => { setCountdown(2); playBeep(false); }, 1000);
                setTimeout(() => { setCountdown(1); playBeep(false); }, 2000);
                setTimeout(() => {
                    setCountdown(null);
                    setRecording(true);
                    setRecordProgress(0);
                    playBeep(true);
                    const startTime = Date.now();
                    const totalMs = sec * 1000;
                    const tick = setInterval(() => {
                        const elapsed = Date.now() - startTime;
                        const p = Math.min(100, (elapsed / totalMs) * 100);
                        setRecordProgress(p);
                        if (elapsed >= totalMs) {
                            clearInterval(tick);
                            setRecording(false);
                            setRecordProgress(0);
                            playBeep(true);
                            showToast('カット！次へ進みましょう');
                        }
                    }, 50);
                }, 3000);
            };

            const finishShoot = () => {
                saveJournalEntry({
                    director: director.name,
                    scene: scene.label,
                    theme: theme.label,
                    duration: duration.label,
                    cuts: guideData.cuts.length
                });
                setJournal(loadJournal());
                setConfetti(true);
                playSuccessSound();
                setStep('complete');
                setTimeout(() => setConfetti(false), 3000);
            };

            const handleCopy = () => {
                const text = `【${snsData.title}】\n\n${snsData.text}\n\n${snsData.tags.join(' ')}`;
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showToast('クリップボードにコピーしました！'); }
                catch (e) { showToast('コピーに失敗しました'); }
                document.body.removeChild(ta);
            };

            const resetAll = () => {
                setStep('top'); setDirector(null); setScene(null); setTheme(null);
                setDuration(null); setGuideData(null); setSnsData(null); setCurrentCut(0);
            };

            // 画面：トップ
            const renderTop = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-sm w-full max-w-sm">
                        <div className="mb-4"><span className="text-4xl">📸</span></div>
                        <h1 className="text-3xl font-black text-gray-800 mb-1">オモイデ・ショート</h1>
                        <p className="inline-block bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1 rounded-full mb-3">Pro版</p>
                        <p className="text-orange-500 font-bold mb-6">〜 大切な時間を残す動画ガイド 〜</p>
                        <p className="text-gray-600 mb-8 font-medium leading-relaxed text-sm">
                            5人の監督がいつでもそばで案内。<br/>
                            5秒ずつ撮るだけで、温かい思い出動画が完成します。
                        </p>
                        <button onClick={() => setStep('director')} className="btn-primary w-full text-xl py-4 rounded-2xl shadow-lg font-bold mb-3">
                            さっそく始める
                        </button>
                        <button onClick={() => setStep('journal')} className="w-full text-gray-600 text-sm font-bold py-2 underline">
                            📔 撮影ジャーナル（{journal.length}件）
                        </button>
                    </div>
                </div>
            );

            // 画面：監督選択
            const renderDirectorSelect = () => (
                <div className="max-w-md mx-auto p-4 flex flex-col min-h-[90vh]">
                    <div className="mb-6 mt-4 text-center">
                        <p className="text-sm text-orange-500 font-bold mb-2">STEP 1 / 4</p>
                        <h2 className="text-2xl font-bold text-gray-800">どの監督と撮りますか？</h2>
                        <p className="text-sm text-gray-500 mt-2">語り口がガラッと変わります</p>
                    </div>
                    <div className="flex flex-col gap-3 flex-grow">
                        {DIRECTORS.map(d => (
                            <button key={d.id}
                                onClick={() => { setDirector(d); setStep('scene'); }}
                                className="bg-white border-2 border-orange-300 rounded-2xl p-4 text-left shadow-sm active:bg-orange-50 transition">
                                <div className="flex items-center gap-3">
                                    <div className="text-4xl">{d.emoji}</div>
                                    <div className="flex-grow">
                                        <p className="font-black text-gray-800 text-lg">{d.name}</p>
                                        <p className="text-xs text-gray-500">{d.desc}</p>
                                        <p className="text-sm text-orange-600 mt-1 italic">「{d.sample}」</p>
                                    </div>
                                </div>
                            </button>
                        ))}
                    </div>
                    <div className="mt-6">
                        <button onClick={() => setStep('top')} className="text-gray-500 font-bold py-3 w-full">◀ トップに戻る</button>
                    </div>
                </div>
            );

            // 画面：選択肢
            const renderSelection = (title, stepNum, options, onSelect, onBack) => (
                <div className="max-w-md mx-auto p-4 flex flex-col min-h-[90vh]">
                    <div className="mb-8 mt-4 text-center">
                        <p className="text-sm text-orange-500 font-bold mb-2">STEP {stepNum} / 4</p>
                        <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
                        {director && (
                            <div className="mt-3 inline-flex items-center bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1 rounded-full">
                                {director.emoji} {director.name}が案内中
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 gap-3 flex-grow">
                        {options.map((opt, i) => (
                            <button key={i} onClick={() => onSelect(opt)}
                                className="btn-select w-full text-lg py-4 rounded-xl font-bold shadow-sm">
                                {opt.label}
                            </button>
                        ))}
                    </div>
                    <div className="mt-6 flex flex-col space-y-2">
                        <button onClick={onBack} className="text-gray-500 font-bold py-3">◀ 1つ前に戻る</button>
                        <button onClick={resetAll} className="text-gray-400 text-sm font-bold py-2">最初からやり直す</button>
                    </div>
                </div>
            );

            // 画面：撮影ガイド
            const renderGuide = () => {
                if (!guideData) return null;
                const cut = guideData.cuts[currentCut];
                const isLast = currentCut === guideData.cuts.length - 1;
                const readAloud = () => {
                    const text = `${voice.openLine}。${cut.instruction}。${voice.purposeLead}${cut.purpose}。${voice.tipLead}${cut.tips}`;
                    speak(text);
                };

                return (
                    <div className="max-w-md mx-auto p-4 flex flex-col min-h-screen">
                        <div className="flex justify-between items-center mb-2 mt-2 px-1">
                            <button onClick={() => setShowResetConfirm(true)} className="text-gray-400 text-sm font-bold">◀ 最初に戻る</button>
                            {currentCut > 0 && (
                                <button onClick={() => setCurrentCut(c => c - 1)} className="text-gray-500 text-sm font-bold bg-white border border-gray-200 px-4 py-1.5 rounded-full shadow-sm">前のカット</button>
                            )}
                        </div>

                        <div className="mb-4">
                            <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                                <span className="text-orange-500 font-bold flex items-center">
                                    {director.emoji} {director.name}
                                </span>
                                <span className="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-bold">
                                    カット {currentCut + 1} / {guideData.cuts.length}
                                </span>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm p-6 mb-6 flex-grow border-t-4 border-orange-400">
                            <p className="text-sm text-orange-600 font-bold mb-2 italic">{voice.openLine}</p>
                            <h2 className="text-2xl font-black text-gray-800 mb-4 leading-tight">{cut.instruction}</h2>

                            <button onClick={readAloud}
                                className="w-full mb-5 bg-blue-50 text-blue-700 py-3 rounded-xl font-bold text-sm border border-blue-200 active:bg-blue-100">
                                🔊 音声で読み上げる（ハンズフリー）
                            </button>

                            <div className="bg-orange-50 p-4 mb-5 rounded-2xl">
                                <p className="text-sm text-orange-800 font-bold mb-1 flex items-center">
                                    <span className="text-xl mr-1">❤️</span> なぜ撮るの？
                                </p>
                                <p className="text-gray-800 font-medium text-sm">{voice.purposeLead}{cut.purpose}</p>
                            </div>

                            <div className="grid grid-cols-2 gap-3 mb-5">
                                <div className="bg-gray-50 p-3 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮影時間</p>
                                    <p className="text-xl font-black text-gray-800">約{cut.duration}秒</p>
                                </div>
                                <div className="bg-gray-50 p-3 rounded-2xl text-center border border-gray-100">
                                    <p className="text-xs text-gray-500 mb-1 font-bold">撮り方</p>
                                    <p className="text-sm font-black text-gray-800">{cut.technique}</p>
                                </div>
                            </div>

                            <div className="space-y-3 mb-5">
                                <div className="bg-green-50/50 p-3 rounded-2xl border border-green-100">
                                    <p className="text-sm font-bold text-green-700 mb-1">✅ {voice.tipLead}</p>
                                    <p className="text-gray-700 text-sm">{cut.tips}</p>
                                </div>
                                <div className="bg-red-50/50 p-3 rounded-2xl border border-red-100">
                                    <p className="text-sm font-bold text-red-600 mb-1">⚠️ {voice.ngLead}</p>
                                    <p className="text-gray-700 text-sm">{cut.ng}</p>
                                </div>
                            </div>

                            <button onClick={() => startCountdown(cut.duration)}
                                className="w-full bg-red-500 text-white py-4 rounded-xl font-bold transition-colors active:bg-red-600 shadow-lg">
                                <span className="text-xl mr-2">📸</span> カウントダウン開始（{cut.duration}秒）
                            </button>
                            <p className="text-xs text-gray-400 mt-2 text-center">※ カウント後、お手持ちのカメラアプリで撮影</p>
                        </div>

                        <button onClick={() => isLast ? finishShoot() : setCurrentCut(c => c + 1)}
                            className="btn-primary w-full text-xl py-5 rounded-2xl shadow-lg font-bold mt-auto mb-4">
                            {isLast ? '🎉 すべての撮影を完了する！' : '撮れた！次の指示へ'}
                        </button>
                    </div>
                );
            };

            // 画面：完了
            const renderComplete = () => (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-12">
                    <div className="text-center mb-6 mt-6 no-print">
                        <div className="badge-pop inline-flex bg-yellow-100 border-4 border-yellow-400 rounded-full w-24 h-24 items-center justify-center mb-4">
                            <span className="text-5xl">🏆</span>
                        </div>
                        <h2 className="text-3xl font-black text-gray-800 mb-2">お疲れさまでした！</h2>
                        <p className="text-orange-600 font-bold text-sm italic">「{voice.complete}」</p>
                        <p className="text-gray-500 text-xs mt-1">- {director.name} -</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-5 mb-5 border-2 border-yellow-200 no-print">
                        <p className="text-xs text-gray-500 font-bold mb-2">獲得バッジ</p>
                        <div className="flex flex-wrap gap-2">
                            <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold">📸 {guideData.cuts.length}カット撮影</span>
                            <span className="bg-pink-100 text-pink-700 px-3 py-1 rounded-full text-xs font-bold">{director.emoji} {director.name}と完走</span>
                            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">⭐ {duration.label.replace('⏱️ ', '')}</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-5 no-print">
                        <h3 className="text-lg font-bold text-gray-800 mb-3 flex items-center"><span className="mr-2">✂️</span>1つに繋げる手順</h3>
                        <ol className="list-decimal list-inside text-gray-700 space-y-2 font-medium text-sm">
                            <li>スマホで <strong>CapCut</strong> を開く</li>
                            <li><strong>「自動カット」</strong> をタップ</li>
                            <li>今撮った動画を <strong>古い順に</strong> 選ぶ</li>
                            <li>あとはAIにおまかせ！</li>
                        </ol>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-5 no-print">
                        <h3 className="text-lg font-bold text-gray-800 mb-3 flex items-center"><span className="mr-2">🎵</span>おすすめBGMの雰囲気</h3>
                        <div className="space-y-2">
                            {BGM_CATEGORIES.map((b, i) => (
                                <a key={i} href={`https://www.youtube.com/results?search_query=${encodeURIComponent(b.q)}`}
                                   target="_blank" rel="noopener noreferrer"
                                   className="block bg-gray-50 p-3 rounded-xl border border-gray-100 active:bg-orange-50">
                                    <p className="font-bold text-gray-800 text-sm">🎶 {b.mood}</p>
                                    <p className="text-xs text-gray-500">{b.desc}</p>
                                </a>
                            ))}
                        </div>
                        <p className="text-xs text-gray-400 mt-2">タップでYouTube検索結果へ</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-5 no-print">
                        <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center"><span className="mr-2">📝</span>シェア用テキスト</h3>
                        <div className="bg-gray-50 p-4 rounded-2xl text-gray-700 whitespace-pre-wrap mb-4 text-sm border border-gray-100">
                            【{snsData.title}】{"\n\n"}{snsData.text}{"\n\n"}{snsData.tags.join(' ')}
                        </div>
                        <button onClick={handleCopy} className="w-full bg-gray-800 text-white py-3 rounded-xl font-bold active:bg-gray-700">
                            📋 テキストをコピー
                        </button>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm p-6 mb-5 no-print">
                        <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center"><span className="mr-2">🖨️</span>印刷ガイド</h3>
                        <p className="text-xs text-gray-500 mb-3">冷蔵庫に貼っておけば家族でも使えます</p>
                        <button onClick={() => window.print()} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold active:bg-blue-700">
                            🖨️ A4で印刷する
                        </button>
                    </div>

                    <button onClick={() => setShowResetConfirm(true)} className="w-full text-orange-600 py-4 font-bold no-print">
                        最初からやり直す
                    </button>

                    {/* 印刷専用エリア */}
                    <div className="print-area">
                        <h1 style={{fontSize: '20px', fontWeight: 'bold', marginBottom: '8px'}}>オモイデ・ショート 撮影ガイド</h1>
                        <p style={{fontSize: '12px', marginBottom: '12px'}}>監督：{director.name} ／ シーン：{scene.label} ／ テーマ：{theme.label} ／ 尺：{duration.label}</p>
                        {guideData.cuts.map((c, i) => (
                            <div key={i} className="print-cut">
                                <p style={{fontWeight: 'bold', fontSize: '14px'}}>カット{i+1}（約{c.duration}秒）：{c.instruction}</p>
                                <p style={{fontSize: '11px', marginTop: '4px'}}>なぜ撮る：{c.purpose}</p>
                                <p style={{fontSize: '11px'}}>撮り方：{c.technique}</p>
                                <p style={{fontSize: '11px'}}>コツ：{c.tips}</p>
                                <p style={{fontSize: '11px'}}>NG：{c.ng}</p>
                            </div>
                        ))}
                        <p style={{fontSize: '10px', marginTop: '12px', color: '#666'}}>※ 撮影後、CapCutの「自動カット」で繋げてください。</p>
                    </div>
                </div>
            );

            // 画面：ジャーナル
            const renderJournal = () => (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-12">
                    <div className="flex justify-between items-center mb-6 mt-4">
                        <h2 className="text-2xl font-black text-gray-800">📔 撮影ジャーナル</h2>
                        <button onClick={() => setStep('top')} className="text-gray-500 text-sm font-bold">トップへ</button>
                    </div>
                    {journal.length === 0 ? (
                        <div className="bg-white rounded-2xl p-8 text-center">
                            <p className="text-gray-500">まだ記録がありません。<br/>撮影を完了すると、ここに残ります。</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {journal.map((j, i) => (
                                <div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                                    <p className="text-xs text-gray-400 mb-1">{new Date(j.savedAt).toLocaleString('ja-JP')}</p>
                                    <p className="font-bold text-gray-800 text-sm">{j.scene}</p>
                                    <p className="text-xs text-gray-600">テーマ：{j.theme}</p>
                                    <p className="text-xs text-gray-600">監督：{j.director} ／ {j.cuts}カット</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            // モーダル
            const renderConfirmModal = () => {
                if (!showResetConfirm) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl">
                            <h3 className="text-xl font-bold text-gray-800 mb-2">最初に戻りますか？</h3>
                            <p className="text-gray-600 text-sm mb-6">現在のガイドのデータはリセットされます。</p>
                            <div className="flex gap-3">
                                <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl">キャンセル</button>
                                <button onClick={() => { setShowResetConfirm(false); resetAll(); }} className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl">戻る</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // カウントダウンオーバーレイ
            const renderCountdownOverlay = () => {
                if (countdown === null && !recording) return null;
                return (
                    <div className="countdown-overlay">
                        {countdown !== null && (
                            <React.Fragment>
                                <p className="text-orange-300 font-bold mb-2">準備して…</p>
                                <div className="countdown-num text-orange-400" key={countdown}>{countdown}</div>
                            </React.Fragment>
                        )}
                        {recording && (
                            <div className="w-full max-w-xs px-6">
                                <p className="text-center text-orange-300 font-bold text-2xl mb-4">撮影中…</p>
                                <div className="bg-gray-700 rounded-full overflow-hidden mb-2">
                                    <div className="recording-bar" style={{width: `${recordProgress}%`}}></div>
                                </div>
                                <p className="text-center text-white text-sm">{Math.round(recordProgress)}%</p>
                                <p className="text-center text-gray-400 text-xs mt-4">※ お手持ちのカメラアプリで撮影してください</p>
                            </div>
                        )}
                    </div>
                );
            };

            // 紙吹雪
            const renderConfetti = () => {
                if (!confetti) return null;
                const colors = ['#f08a5d', '#fbbf24', '#34d399', '#60a5fa', '#f472b6'];
                const pieces = Array.from({length: 50}, (_, i) => ({
                    left: Math.random() * 100,
                    delay: Math.random() * 0.5,
                    color: colors[i % colors.length]
                }));
                return (
                    <React.Fragment>
                        {pieces.map((p, i) => (
                            <div key={i} className="confetti-piece"
                                style={{left: `${p.left}%`, animationDelay: `${p.delay}s`, backgroundColor: p.color}}></div>
                        ))}
                    </React.Fragment>
                );
            };

            return (
                <div className="font-sans antialiased">
                    {step === 'top'      && renderTop()}
                    {step === 'director' && renderDirectorSelect()}
                    {step === 'scene'    && renderSelection('どんなシーンで撮りますか？', 2, SCENES,    (v) => { setScene(v); setStep('theme'); },    () => setStep('director'))}
                    {step === 'theme'    && renderSelection('動画のメインテーマは？',     3, THEMES,    (v) => { setTheme(v); setStep('duration'); }, () => setStep('scene'))}
                    {step === 'duration' && renderSelection('動画の長さは？',             4, DURATIONS, (v) => startGuide(v),                          () => setStep('theme'))}
                    {step === 'guide'    && renderGuide()}
                    {step === 'complete' && renderComplete()}
                    {step === 'journal'  && renderJournal()}

                    {renderConfirmModal()}
                    {renderCountdownOverlay()}
                    {renderConfetti()}

                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-50 text-sm font-bold animate-fade-in-up whitespace-nowrap">
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
